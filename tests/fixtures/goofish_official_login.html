<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23ffe815'/%3E%3Cpath d='M8 10h16v12H8z' fill='%23111'/%3E%3C/svg%3E" />
    <title>Official login fixture</title>
  </head>
  <body>
    <main id="goofish-login-parent" data-entry="https://www.goofish.com/login">
      <section id="mini-login" data-app-name="xianyu">
        <nav aria-label="login methods">
          <button id="sms-tab" type="button">短信登录</button>
          <a class="password-login-tab-item" href="#password">密码登录</a>
        </nav>
        <div class="qrcode"><img class="qrcode-img" alt="闲鱼登录二维码" src="fixture-qr.png" /></div>
        <input type="tel" autocomplete="tel" aria-label="手机号" />
        <input id="fm-login-id" name="fm-login-id" autocomplete="username" />
        <input id="fm-login-password" name="fm-login-password" type="password" />
        <input id="fm-agreement-checkbox" name="agreement" type="checkbox" />
        <button class="password-login" type="submit">登录</button>
        <div class="nc-container" id="verification-region" hidden>人工验证</div>
      </section>
    </main>
    <script>
      window.fixtureShowVerification = () => {
        document.querySelector('#verification-region').hidden = false;
      };
      window.fixtureLoginResult = () => {
        window.__xianyuOfficialLoginEvents = ['loginResult'];
      };
    </script>
  </body>
</html>
