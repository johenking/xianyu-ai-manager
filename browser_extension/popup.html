<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23FFE815'/%3E%3Ctext x='50' y='70' text-anchor='middle' font-size='60' font-family='Arial' font-weight='700' fill='%23111'%3E%E9%97%B2%3C/text%3E%3C/svg%3E" />
    <title>导入闲鱼登录态</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header class="brand">
        <svg class="brand-icon" viewBox="0 0 100 100" role="img" aria-label="咸鱼监控台">
          <rect width="100" height="100" rx="20" fill="#FFE815"></rect>
          <text x="50" y="70" text-anchor="middle" font-size="60" font-family="Arial, sans-serif" font-weight="700" fill="#111">闲</text>
        </svg>
        <div>
          <h1>导入闲鱼登录态</h1>
          <p>仅发送到本机 127.0.0.1</p>
        </div>
      </header>

      <label for="pairing">配对信息</label>
      <textarea id="pairing" rows="3" autocomplete="off" spellcheck="false" placeholder="从咸鱼监控台复制后粘贴到这里"></textarea>
      <p class="hint">扩展不会保存或显示完整 Cookie；关闭弹窗后配对信息即消失。</p>

      <div id="status" class="status" role="status" aria-live="polite">请先打开闲鱼官网并确认已登录。</div>

      <div class="actions">
        <button id="import" class="primary" type="button">导入到咸鱼监控台</button>
        <button id="open-goofish" class="secondary" type="button">打开闲鱼官方网站</button>
      </div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
